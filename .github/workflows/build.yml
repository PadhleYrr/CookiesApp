name: Build Native APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history to count commits

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Count total commits = build number
      - name: Get build number from commit count
        id: buildnum
        run: |
          BUILD=$(git rev-list --count HEAD)
          echo "BUILD_NUMBER=$BUILD" >> $GITHUB_ENV
          echo "Build number: $BUILD"

      # Patch app_name in strings.xml → "1 Cookie Browser", "2 Cookie Browser" …
      - name: Patch app name and package with build number
        run: |
          B=$BUILD_NUMBER

          # 1. strings.xml — app label
          sed -i "s|<string name=\"app_name\">.*</string>|<string name=\"app_name\">${B} Cookie Browser</string>|" \
            app/src/main/res/values/strings.xml

          # 2. build.gradle — unique applicationId + versionCode/Name
          sed -i "s|applicationId \"com.cookiegrabber.app\"|applicationId \"com.cookiegrabber.app${B}\"|" \
            app/build.gradle
          sed -i "s|versionCode [0-9]*|versionCode ${B}|" \
            app/build.gradle
          sed -i "s|versionName \"[^\"]*\"|versionName \"${B}.0\"|" \
            app/build.gradle

          echo "--- Patched strings.xml ---"
          cat app/src/main/res/values/strings.xml
          echo "--- Patched build.gradle ---"
          grep -E "applicationId|versionCode|versionName|app_name" \
            app/build.gradle app/src/main/res/values/strings.xml

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Generate gradle wrapper jar
        run: gradle wrapper --gradle-version 8.6 --distribution-type bin

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK with build number
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/CookieBrowser-v${BUILD_NUMBER}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CookieBrowser-v${{ env.BUILD_NUMBER }}
          path: app/build/outputs/apk/debug/CookieBrowser-v${{ env.BUILD_NUMBER }}.apk
          retention-days: 30

      - name: Auto-create GitHub Release for every build
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.BUILD_NUMBER }}
          name: "${{ env.BUILD_NUMBER }} Cookie Browser"
          body: "Build #${{ env.BUILD_NUMBER }} — auto release from commit ${{ github.sha }}"
          files: app/build/outputs/apk/debug/CookieBrowser-v${{ env.BUILD_NUMBER }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
